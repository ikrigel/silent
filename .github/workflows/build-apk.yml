name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          echo "Starting Android APK build..."
          echo "Java version:"
          java -version
          echo ""
          echo "Gradle version:"
          ./gradlew --version
          echo ""
          echo "Building APK..."
          ./gradlew assembleRelease -x lint --stacktrace --info

      - name: Check if APK was created
        run: |
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "✓ APK file created successfully"
            ls -lh android/app/build/outputs/apk/release/app-release.apk
          else
            echo "✗ APK file not found!"
            echo ""
            echo "Checking build directory..."
            if [ -d "android/app/build" ]; then
              echo "Build directory exists. Contents:"
              find android/app/build -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
              echo ""
              echo "Full build outputs structure:"
              find android/app/build/outputs -type f -o -type d 2>/dev/null | head -100
            else
              echo "Build directory doesn't exist!"
              ls -la android/app/
            fi
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: silent-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Silent ${{ github.ref_name }}
          body: |
            ## Silent ${{ github.ref_name }}

            Download `app-release.apk` below and install it on your Android device.

            **Installation Instructions:**
            1. Download `app-release.apk` from the Assets section below
            2. On your Android device, go to Settings → Security → Enable "Install from Unknown Sources"
            3. Open the downloaded APK file and tap Install
            4. Open Silent and go to Robot page → Follow the setup guide to enable Accessibility Service

            **Features:**
            - Schedule emergency alert silencing
            - Control WEA (Wireless Emergency Alerts) via accessibility automation
            - Airplane mode scheduling
            - Manual and recorded UI sequences

            **Requirements:**
            - Android 8.0 or higher
            - Enable Accessibility Service for Silent Robot
