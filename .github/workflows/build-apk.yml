name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "Installing npm dependencies..."
          npm ci
          if [ $? -ne 0 ]; then
            echo "❌ npm ci failed!"
            exit 1
          fi
          echo "✓ Dependencies installed"

      - name: Build web app
        run: |
          echo "Building web app..."
          npm run build
          if [ $? -ne 0 ]; then
            echo "❌ Web app build failed!"
            exit 1
          fi
          echo "✓ Web app built successfully"

      - name: Verify Android files
        run: |
          echo "Checking for required Android files..."
          [ -d "android" ] && echo "✓ android/ directory exists" || { echo "❌ android/ directory missing!"; exit 1; }
          [ -f "android/gradlew" ] && echo "✓ gradlew exists" || { echo "❌ gradlew missing!"; exit 1; }
          [ -d "android/app" ] && echo "✓ android/app/ exists" || { echo "❌ android/app/ missing!"; exit 1; }
          [ -f "capacitor.config.ts" ] && echo "✓ capacitor.config.ts exists" || { echo "⚠️  capacitor.config.ts missing"; }

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: |
          echo "Syncing Capacitor..."
          npx cap sync android
          if [ $? -ne 0 ]; then
            echo "❌ Capacitor sync failed!"
            exit 1
          fi
          echo "✓ Capacitor synced successfully"

      - name: Ensure debug keystore exists
        run: |
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            echo "Creating debug keystore..."
            mkdir -p "$HOME/.android"
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
            echo "✓ Debug keystore created"
          else
            echo "✓ Debug keystore already exists"
          fi

      - name: Make gradlew executable
        run: |
          echo "Making gradlew executable..."
          chmod +x android/gradlew
          [ -x android/gradlew ] && echo "✓ gradlew is executable" || { echo "❌ Failed to make gradlew executable!"; exit 1; }

      - name: Display build environment info
        run: |
          echo "=== BUILD ENVIRONMENT ==="
          echo "Java version:"
          java -version 2>&1
          echo ""
          echo "Gradle version:"
          cd android && ./gradlew --version 2>&1
          echo ""
          echo "Current directory:"
          pwd
          echo ""
          echo "Android directory contents:"
          ls -la android/ | head -20

      - name: Build release APK
        working-directory: android
        run: |
          echo "Starting Android APK build..."
          echo "Building with: ./gradlew assembleRelease -x lint"
          ./gradlew assembleRelease -x lint --stacktrace --info
          BUILD_STATUS=$?

          if [ $BUILD_STATUS -ne 0 ]; then
            echo ""
            echo "❌ Gradle build failed with exit code: $BUILD_STATUS"
            echo ""
            echo "Checking for build output files..."
            find app/build -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit $BUILD_STATUS
          fi
          echo ""
          echo "✓ Gradle build completed successfully"

      - name: Check if APK was created
        run: |
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "✓ APK file created successfully"
            ls -lh android/app/build/outputs/apk/release/app-release.apk
          else
            echo "✗ APK file not found!"
            echo ""
            echo "Checking build directory..."
            if [ -d "android/app/build" ]; then
              echo "Build directory exists. Contents:"
              find android/app/build -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
              echo ""
              echo "Full build outputs structure:"
              find android/app/build/outputs -type f -o -type d 2>/dev/null | head -100
            else
              echo "Build directory doesn't exist!"
              ls -la android/app/
            fi
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: silent-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Silent ${{ github.ref_name }}
          body: |
            ## Silent ${{ github.ref_name }}

            Download `app-release.apk` below and install it on your Android device.

            **Installation Instructions:**
            1. Download `app-release.apk` from the Assets section below
            2. On your Android device, go to Settings → Security → Enable "Install from Unknown Sources"
            3. Open the downloaded APK file and tap Install
            4. Open Silent and go to Robot page → Follow the setup guide to enable Accessibility Service

            **Features:**
            - Schedule emergency alert silencing
            - Control WEA (Wireless Emergency Alerts) via accessibility automation
            - Airplane mode scheduling
            - Manual and recorded UI sequences

            **Requirements:**
            - Android 8.0 or higher
            - Enable Accessibility Service for Silent Robot
