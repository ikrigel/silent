name: Test & Deploy

# Trigger on every push to master
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # ── Job 1: Run Playwright UI tests ─────────────────────────────────────────
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers (Chromium, Firefox, WebKit)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Build first so the dev server starts cleanly
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # Run the full test suite; Playwright auto-starts the dev server
      - name: Run Playwright tests
        run: npm test
        env:
          VITE_RECAPTCHA_SITE_KEY: 6LcAOY0sAAAAABqFjpb-9KK5jOb905i7ar7iHVoJ

      # Upload HTML report as an artifact — visible in GitHub Actions UI
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Job 2: Deploy to Vercel (only after tests pass) ──────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test            # only runs if `test` job succeeds
    if: github.ref == 'refs/heads/master'   # only deploy from master, not PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # Deploy to Vercel production
      # Required GitHub secrets:
      #   VERCEL_TOKEN      — vercel.com/account/tokens
      #   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
      #   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
