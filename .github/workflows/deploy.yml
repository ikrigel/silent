name: Test & Deploy

# Trigger on every push to master
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  # Opt into Node.js 24 early to future-proof workflows
  # (will be required starting June 2nd, 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Run Playwright UI tests ─────────────────────────────────────────
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers (Chromium, Firefox, WebKit)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Build first so the dev server starts cleanly
      - name: Build
        run: npm run build

      # Run the full test suite; Playwright auto-starts the dev server
      - name: Run Playwright tests
        run: npm test

      # Upload HTML report as an artifact — visible in GitHub Actions UI
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Job 2: Deploy to Vercel (only after tests pass) ──────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test            # only runs if `test` job succeeds
    if: github.ref == 'refs/heads/master'   # only deploy from master, not PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Deploy to Vercel production
      # Required GitHub secrets:
      #   VERCEL_TOKEN      — vercel.com/account/tokens
      #   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
      #   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: .
