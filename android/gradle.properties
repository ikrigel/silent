# JVM target version (Java 21 for AGP 8.13.0 and compileSdk 36)
gradle.jvm.version=21

# JVM memory tuning (Kotlin 2.1.0 + Firebase BOM 33.0.0 require more metaspace)
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g

# Other optimizations
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
